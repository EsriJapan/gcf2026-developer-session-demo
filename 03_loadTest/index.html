<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developer Session Demo - Load Test</title>

  <!-- ArcGIS Maps SDK for JavaScript 5.0 (Calcite含む) -->
  <script type="module" src="https://js.arcgis.com/5.0/"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    .wrap { margin: 0 auto; padding: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-1 { grid-template-columns: 1fr; }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
    }
    .muted { opacity: 0.8; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .table-wrap { max-height: 800px; overflow: auto; border-radius: 12px; }
    .kpi { display: flex; gap: 12px; flex-wrap: wrap; }
    .kpi calcite-chip { --calcite-chip-padding: 6px 10px; }
  </style>
</head>

<body>
  <calcite-shell>
    <calcite-shell-panel slot="panel-start" width-scale="m">
      <calcite-panel heading="Load Test" description="API Gateway 経由で Velocity へ POST（JSON）">
        <div class="wrap">

          <calcite-notice id="notice" kind="info" open closable>
            <div slot="message">「実行」を押すと、指定頻度で POST を繰り返します。</div>
          </calcite-notice>

          <div class="grid">
            <calcite-label>
              送信先 URL（API Gateway）
              <calcite-input-text
                id="endpoint"
                value="https://isf3wq6ep9.execute-api.ap-northeast-1.amazonaws.com/gcfdemo/tap">
              </calcite-input-text>
            </calcite-label>

            <calcite-label>
              UserName（表示用のみ・POSTには使いません）
              <calcite-input-text id="userName" value="DemoUser"></calcite-input-text>
            </calcite-label>

            <calcite-label>
              間隔（秒）
              <calcite-input-number id="intervalSec" min="0.05" step="0.05" value="1"></calcite-input-number>
            </calcite-label>

            <calcite-label>
              回数（回/間隔）
              <calcite-input-number id="countPerTick" min="1" step="1" value="5"></calcite-input-number>
            </calcite-label>

            <calcite-label>
              総実行時間（秒）: 0 で無制限
              <calcite-input-number id="totalSec" min="0" step="1" value="10"></calcite-input-number>
            </calcite-label>

            <calcite-label>
              同時実行数（クライアント側の並列数）
              <calcite-input-number id="concurrency" min="1" step="1" value="10"></calcite-input-number>
            </calcite-label>
          </div>

          <calcite-divider></calcite-divider>

          <div class="grid grid-1">
            <div class="row">
              <calcite-button id="startBtn" icon-start="play">実行</calcite-button>
              <calcite-button id="stopBtn" icon-start="pause" appearance="outline" disabled>停止</calcite-button>
              <calcite-button id="resetCounterBtn" appearance="transparent" icon-start="reset">TapCount リセット</calcite-button>
              <calcite-progress id="progress" type="indeterminate" hidden></calcite-progress>
            </div>

            <div class="kpi">
              <calcite-chip id="kpiRps" icon="graph-time-series" scale="s">RPS: 0.00</calcite-chip>
              <calcite-chip id="kpiAvg" icon="clock" scale="s">Avg(ms): -</calcite-chip>
              <calcite-chip id="kpiP95" icon="clock" scale="s">P95(ms): -</calcite-chip>
              <calcite-chip id="kpiOkNg" icon="check-circle" scale="s">OK/NG: 0/0</calcite-chip>
            </div>

            <calcite-label>
              ペイロード例
              <calcite-text-area id="payloadSample" class="mono" read-only rows="8"></calcite-text-area>
            </calcite-label>

            <calcite-label>
              実行状況
              <calcite-text-area id="status" class="mono" read-only rows="8"></calcite-text-area>
            </calcite-label>
          </div>
        </div>
      </calcite-panel>
    </calcite-shell-panel>

    <div class="wrap">
      <h2 style="margin-top: 8px;">送信履歴（レスポンスタイム / HTTP ステータス）</h2>
      <p class="muted">最新の送信結果を上から新しい順に表示します。</p>

      <div class="table-wrap">
        <calcite-table id="historyTable" caption="Request history" bordered>
          <calcite-table-row slot="table-header">
            <calcite-table-header heading="Time"></calcite-table-header>
            <calcite-table-header heading="Req#"></calcite-table-header>
            <calcite-table-header heading="UserName"></calcite-table-header>
            <calcite-table-header heading="TapCount"></calcite-table-header>
            <calcite-table-header heading="HTTP"></calcite-table-header>
            <calcite-table-header heading="RTT (ms)"></calcite-table-header>
            <calcite-table-header heading="Guid"></calcite-table-header>
            <calcite-table-header heading="Note"></calcite-table-header>
          </calcite-table-row>
        </calcite-table>
      </div>
    </div>
  </calcite-shell>

  <script type="module">
    const $ = (id) => document.getElementById(id);

    const endpointEl = $("endpoint");
    const userNameEl = $("userName"); // UIは残す（POSTには使わない）
    const intervalSecEl = $("intervalSec");
    const countPerTickEl = $("countPerTick");
    const totalSecEl = $("totalSec");
    const concurrencyEl = $("concurrency");

    const payloadSampleEl = $("payloadSample");
    const statusEl = $("status");

    const startBtn = $("startBtn");
    const stopBtn = $("stopBtn");
    const resetCounterBtn = $("resetCounterBtn");
    const progressEl = $("progress");
    const noticeEl = $("notice");

    const historyTable = $("historyTable");

    const kpiRps = $("kpiRps");
    const kpiAvg = $("kpiAvg");
    const kpiP95 = $("kpiP95");
    const kpiOkNg = $("kpiOkNg");

    // 実行制御
    let running = false;
    let startedAt = 0;
    let tickTimer = null;

    // 統計
    let ticks = 0;
    let sent = 0;
    let ok = 0;
    let ng = 0;
    let requestSeq = 0;

    // TapCount（ユーザー別）
    const userTapCounts = new Map(); // key: userName -> count

    // 履歴
    const history = [];
    const rttSamples = [];

    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    // UserName候補（名詞）
    const JAPANESE_NOUNS = [
      "りんご","みかん","ぶどう","もも","いちご",
      "おにぎり","うどん","そば","カレー","すし",
      "ねこ","いぬ","さくら","やま","うみ",
      "くも","ほし","でんしゃ","はし","まつり",
      "えんぴつ","ほん","じてんしゃ","かさ"
    ];

    function randomUserName() {
      return JAPANESE_NOUNS[randInt(0, JAPANESE_NOUNS.length - 1)];
    }

    function uuid() {
      if (globalThis.crypto?.randomUUID) return crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}-${Math.random().toString(16).slice(2)}`;
    }

    // 適当に日本付近（必要なら元の lat/lon UI を戻せます）
    function randomJapanPoint() {
      const Lat = Number((24 + Math.random() * (46 - 24)).toFixed(6));
      const Lon = Number((123 + Math.random() * (146 - 123)).toFixed(6));
      return { Lat, Lon };
    }

    // preview=true のときは TapCount を進めない（サンプル表示用）
    function buildPayload({ preview = false } = {}) {
      const user = randomUserName();
      const current = userTapCounts.get(user) || 0;
      const tap = current + 1;
      if (!preview) userTapCounts.set(user, tap);

      const { Lat, Lon } = randomJapanPoint();

      return {
        Guid: uuid(),
        UserName: user,
        Qnum: randInt(1, 5),
        InputDate: Date.now(),
        Lat,
        Lon,
        TapCount: tap
      };
    }

    function updateSample() {
      payloadSampleEl.value = JSON.stringify(buildPayload({ preview: true }), null, 2);
    }

    function percentile(arr, p) {
      if (!arr.length) return null;
      const a = [...arr].sort((x, y) => x - y);
      const idx = (a.length - 1) * p;
      const lo = Math.floor(idx);
      const hi = Math.ceil(idx);
      if (lo === hi) return a[lo];
      const w = idx - lo;
      return a[lo] * (1 - w) + a[hi] * w;
    }

    function updateKpis() {
      const elapsed = running ? (Date.now() - startedAt) / 1000 : 0;
      const rps = elapsed > 0 ? (sent / elapsed) : 0;
      const avg = rttSamples.length ? (rttSamples.reduce((s, v) => s + v, 0) / rttSamples.length) : null;
      const p95 = rttSamples.length ? percentile(rttSamples, 0.95) : null;

      kpiRps.textContent = `RPS: ${rps.toFixed(2)}`;
      kpiAvg.textContent = `Avg(ms): ${avg == null ? "-" : avg.toFixed(1)}`;
      kpiP95.textContent = `P95(ms): ${p95 == null ? "-" : p95.toFixed(1)}`;
      kpiOkNg.textContent = `OK/NG: ${ok}/${ng}`;
    }

    function logStatus(extra = "") {
      const elapsed = running ? (Date.now() - startedAt) / 1000 : 0;
      statusEl.value =
`running: ${running}
elapsed(s): ${elapsed.toFixed(1)}
ticks: ${ticks}
sent: ${sent}
ok: ${ok}
ng: ${ng}
requestSeq: ${requestSeq}
users(count): ${userTapCounts.size}
${extra ? "\n" + extra : ""}`.trim();
      updateKpis();
    }

    function setUiRunning(isRunning) {
      // 実行・停止ボタン状態（ここが前回抜けていたため「停止が押せない」になっていました）
      startBtn.disabled = isRunning;
      stopBtn.disabled = !isRunning;

      // 入力系（必要なら細かく調整）
      endpointEl.disabled = isRunning;
      userNameEl.disabled = isRunning; // 表示用だが一応同期
      intervalSecEl.disabled = isRunning;
      countPerTickEl.disabled = isRunning;
      totalSecEl.disabled = isRunning;
      concurrencyEl.disabled = isRunning;

      progressEl.hidden = !isRunning;
    }

    function clearRows() {
      const rows = Array.from(historyTable.querySelectorAll("calcite-table-row"))
        .filter(r => r.getAttribute("slot") !== "table-header");
      rows.forEach(r => r.remove());
    }

    function renderHistory() {
      clearRows();
      const maxRows = 200; // 必要ならUIで変更に戻せます
      const slice = history.slice(0, maxRows);

      for (const item of slice) {
        const row = document.createElement("calcite-table-row");

        const cTime = document.createElement("calcite-table-cell");
        cTime.textContent = item.time;

        const cReq = document.createElement("calcite-table-cell");
        cReq.textContent = String(item.reqNo);

        const cUser = document.createElement("calcite-table-cell");
        cUser.textContent = item.user;

        const cTap = document.createElement("calcite-table-cell");
        cTap.textContent = String(item.tapCount);

        const cHttp = document.createElement("calcite-table-cell");
        cHttp.textContent = String(item.status);
        if (String(item.status).startsWith("2")) cHttp.style.color = "var(--calcite-color-status-success)";
        else if (item.status === "ERR") cHttp.style.color = "var(--calcite-color-status-danger)";
        else if (String(item.status).startsWith("4") || String(item.status).startsWith("5"))
          cHttp.style.color = "var(--calcite-color-status-danger)";

        const cMs = document.createElement("calcite-table-cell");
        cMs.textContent = item.ms != null ? item.ms.toFixed(1) : "-";

        const cGuid = document.createElement("calcite-table-cell");
        cGuid.classList.add("mono");
        cGuid.textContent = item.guid || "-";

        const cNote = document.createElement("calcite-table-cell");
        cNote.textContent = item.note || "";

        row.append(cTime, cReq, cUser, cTap, cHttp, cMs, cGuid, cNote);
        historyTable.appendChild(row);
      }
    }

    function createSemaphore(limit) {
      let active = 0;
      const queue = [];
      const acquire = () => new Promise(resolve => {
        const tryAcquire = () => {
          if (active < limit) {
            active++;
            resolve(() => {
              active--;
              const next = queue.shift();
              if (next) next();
            });
          } else {
            queue.push(tryAcquire);
          }
        };
        tryAcquire();
      });
      return { acquire };
    }

    async function postJson(url, payload) {
      const t0 = performance.now();
      let status = "ERR";
      let note = "";
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        status = res.status;
        if (!res.ok) {
          const text = await res.text().catch(() => "");
          note = (text || "").slice(0, 120);
          throw new Error(`HTTP ${res.status} ${res.statusText}`);
        }
        const ms = performance.now() - t0;
        return { ok: true, status, ms, note };
      } catch (e) {
        const ms = performance.now() - t0;
        note = note || (e?.message ? String(e.message).slice(0, 120) : "fetch failed");
        return { ok: false, status, ms, note };
      }
    }

    function addHistory(entry) {
      history.unshift(entry);
      const maxKeep = 5000;
      if (history.length > maxKeep) history.length = maxKeep;

      rttSamples.push(entry.ms);
      if (rttSamples.length > maxKeep) rttSamples.splice(0, rttSamples.length - maxKeep);

      renderHistory();
    }

    async function runTickOnce() {
      const url = endpointEl.value.trim();
      if (!url) {
        noticeEl.kind = "danger";
        noticeEl.open = true;
        noticeEl.innerHTML = `<div slot="message">送信先 URL（API Gateway）を入力してください。</div>`;
        stop("Endpoint empty");
        return;
      }

      // ★総実行時間の判定（前回抜けていたため止まらない）
      const totalSec = Math.max(0, Math.floor(Number(totalSecEl.value || 0)));
      const elapsed = (Date.now() - startedAt) / 1000;
      if (totalSec > 0 && elapsed >= totalSec) {
        stop("Reached totalSec");
        return;
      }

      ticks++;

      const countPerTick = Math.max(1, Math.floor(Number(countPerTickEl.value || 1)));
      const concurrency = Math.max(1, Math.floor(Number(concurrencyEl.value || 10)));
      const sem = createSemaphore(concurrency);

      const tasks = Array.from({ length: countPerTick }, async () => {
        const release = await sem.acquire();
        try {
          const reqNo = ++requestSeq;
          const payload = buildPayload();
          sent++;

          const result = await postJson(url, payload);

          const entry = {
            time: new Date().toLocaleTimeString("ja-JP", { hour12: false }),
            reqNo,
            user: payload.UserName,
            tapCount: payload.TapCount,
            status: result.status,
            ms: result.ms,
            guid: payload.Guid,
            note: result.ok ? "" : result.note
          };

          if (result.ok) ok++; else ng++;
          addHistory(entry);
        } finally {
          release();
        }
      });

      await Promise.all(tasks);
      logStatus();
    }

    function scheduleNextTick() {
      if (!running) return;

      const intervalMs = Math.max(50, Number(intervalSecEl.value || 1) * 1000);

      tickTimer = setTimeout(async () => {
        try {
          await runTickOnce();
        } finally {
          scheduleNextTick();
        }
      }, intervalMs);
    }

    function start() {
      if (running) return;

      running = true;
      startedAt = Date.now();
      ticks = 0;
      sent = 0;
      ok = 0;
      ng = 0;
      requestSeq = 0;
      rttSamples.length = 0;
      history.length = 0;
      userTapCounts.clear();

      noticeEl.kind = "info";
      noticeEl.open = true;
      noticeEl.innerHTML = `<div slot="message">実行中です（停止を押すまで継続。総実行時間が 0 以外なら自動停止）。</div>`;

      setUiRunning(true);
      updateSample();
      renderHistory();
      logStatus("Started.");

      (async () => {
        await runTickOnce();    // 即時1回
        scheduleNextTick();     // 次回以降をスケジュール
      })();
    }

    function stop(reason = "Stopped") {
      if (!running) return;

      running = false;
      if (tickTimer) clearTimeout(tickTimer);
      tickTimer = null;

      noticeEl.kind = "success";
      noticeEl.open = true;
      noticeEl.innerHTML = `<div slot="message">停止しました。reason=${reason} / sent=${sent}, ok=${ok}, ng=${ng}, users=${userTapCounts.size}</div>`;

      setUiRunning(false);
      updateSample();
      logStatus("Stopped.");
    }

    function resetTapCount() {
      userTapCounts.clear();
      updateSample();
      logStatus("TapCount reset: cleared per-user counters.");
    }

    startBtn.addEventListener("click", start);
    stopBtn.addEventListener("click", () => stop("User clicked stop"));
    resetCounterBtn.addEventListener("click", resetTapCount);

    // initial
    setUiRunning(false);
    updateSample();
    renderHistory();
    updateKpis();
    logStatus("Ready.");
  </script>
</body>
</html>
