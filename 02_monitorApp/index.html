<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Session Demo - Answer Monitor</title>

  <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
  <script type="module" src="https://js.arcgis.com/5.0/"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html,
    body,
    calcite-shell {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #shellPanelBottom {
      /* height: 300px; */
      overflow: hidden;
    }

    #chartWrap {
      height: 100%;
      padding: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #chartHeader {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    #chartCanvasWrap {
      flex: 1;
      min-height: 0;
      /* これがないと flex 内 canvas が潰れることがあります */
    }

    #answerChart {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>

  <!-- OAuth 認証コード -->
  <script type="module">

    async function pageLoaded() {
      const [
        esriConfig,
        esriId,
        OAuthInfo,
        Portal
      ] = await $arcgis.import([
        "@arcgis/core/config.js",
        "@arcgis/core/identity/IdentityManager.js",
        "@arcgis/core/identity/OAuthInfo",
        "@arcgis/core/portal/Portal.js"
      ]);

      esriConfig.portalUrl = "https://gcfdemo-enterprise121.pp2g-esrij.com/portal";

      const info = new OAuthInfo({
        appId: "9yhHlNsxgacu2dJU",
        portalUrl: esriConfig.portalUrl,
        popup: false
      });

      esriId.registerOAuthInfos([info]);
      esriId.getCredential(info.portalUrl + "/sharing");
      const portal = new Portal();
      await portal.load();

      esriId.checkSignInStatus(info.portalUrl + "/sharing")
        .then(() => { });
    }

    pageLoaded();
  </script>

</head>

<body>
  <calcite-shell>

    <calcite-navigation slot="header">
      <calcite-navigation-logo slot="logo" heading="Developer Session デモ (回答確認)"></calcite-navigation-logo>
    </calcite-navigation>

    <calcite-shell-panel id="shellPanelStart" slot="panel-start">
      <arcgis-layer-list reference-element="arcgisMap"></arcgis-layer-list>
    </calcite-shell-panel>

    <calcite-shell-panel id="shellPanelBottom" slot="panel-bottom" collapsed>
      <div id="chartWrap">
        <div id="chartHeader">
          <calcite-label scale="s" layout="inline">
            対象レイヤー
            <calcite-select id="layerSelect" scale="s">
              <calcite-option value="all" selected>タップ地点</calcite-option>
              <calcite-option value="q1">Q1</calcite-option>
              <calcite-option value="q2">Q2</calcite-option>
              <calcite-option value="q3">Q3</calcite-option>
              <calcite-option value="q4">Q4</calcite-option>
              <calcite-option value="q5">Q5</calcite-option>
            </calcite-select>
          </calcite-label>

          <span id="chartStatus" style="margin-left:12px; font-size:12px; opacity:.8;"></span>
        </div>

        <div id="chartCanvasWrap">
          <canvas id="answerChart"></canvas>
        </div>
      </div>
    </calcite-shell-panel>

    <arcgis-map item-id="89b3415cd771482d9b29d2a85a61a990" id="arcgisMap">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-home slot="top-left"></arcgis-home>
      <calcite-button id="toggleChartBtn" slot="bottom-right" icon-start="graph-bar" kind="neutral"
        appearance="outline-fill"></calcite-button>
    </arcgis-map>

  </calcite-shell>

  <script type="module">
    const arcgisMap = document.getElementById("arcgisMap");
    await arcgisMap.viewOnReady();

    arcgisMap.view.constraints = { snapToZoom: false };

    // 表示用（任意）
    const chartStatus = document.getElementById("chartStatus");

    // reactiveUtils（今回は未使用だが残してOK）
    const [reactiveUtils] = await $arcgis.import([
      "@arcgis/core/core/reactiveUtils.js"
    ]);

    // -----------------------------
    // 設定値
    // -----------------------------
    const TOP_N = 10;         // ★上位10名
    const POLL_MS = 1000;     // 更新間隔（ms）
    const QUERY_NUM = 800;    // 取得件数（必要に応じて調整）

    const Q_KEYS = ["q1", "q2", "q3", "q4", "q5"]; // ★allのときに合算する対象

    // -----------------------------
    // 1) LayerView の取得（Promise.all で待つ）
    // -----------------------------
    const layerViewsObj = { all: null, q1: null, q2: null, q3: null, q4: null, q5: null };

    const titleToKey = new Map([
      ["タップ地点", "all"],
      ["Q1", "q1"],
      ["Q2", "q2"],
      ["Q3", "q3"],
      ["Q4", "q4"],
      ["Q5", "q5"],
    ]);

    const layerViewReadyPromises = [];
    arcgisMap.map.allLayers.forEach(layer => {
      const key = titleToKey.get(layer.title);
      if (!key) return;

      layerViewReadyPromises.push(
        arcgisMap.whenLayerView(layer).then(lv => {
          layerViewsObj[key] = lv;
        })
      );
    });

    await Promise.all(layerViewReadyPromises);

    // -----------------------------
    // 2) Chart.js 初期化
    // -----------------------------
    const ctx = document.getElementById("answerChart");
    const shellPanelBottom = document.getElementById("shellPanelBottom");

    const chart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: [],
        datasets: [{
          label: "TapCount MAX 上位10 (UserName)",
          data: [],
          backgroundColor: [],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
          legend: { display: true },
          title: { display: true, text: "上位 10 ユーザー（TapCount MAX / アプリ起動以降）" }
        },
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
      }
    });

    new ResizeObserver(() => chart.resize()).observe(shellPanelBottom);

    function setChartNoData(message = "受信データなし") {
      chart.data.labels = [message];
      chart.data.datasets[0].data = [0];
      chart.data.datasets[0].backgroundColor = ["#bab0ab"];
      chart.update("none");
    }

    // -----------------------------
    // 3) UserName → TapCount MAX を「レイヤーごと」に保持
    // -----------------------------
    const statsByLayer = {
      all: new Map(), // ★allは q1〜q5 の合算結果を入れる
      q1: new Map(),
      q2: new Map(),
      q3: new Map(),
      q4: new Map(),
      q5: new Map()
    };

    function ingestGraphicsMax(map, graphics) {
      if (!graphics) return;

      const arr = Array.isArray(graphics)
        ? graphics
        : (graphics?.toArray ? graphics.toArray() : [graphics]);

      for (const g of arr) {
        const a = g?.attributes;
        if (!a) continue;

        const name = a.UserName;
        const tap = a.TapCount;
        if (name == null || tap == null) continue;

        const user = String(name);
        const value = Number(tap) || 0;

        const cur = map.get(user);
        if (cur == null || value > cur) map.set(user, value);
      }
    }

    // ★q1〜q5 の max Map から all(合算) Map を再計算
    function recomputeAllFromQs() {
      const allMap = new Map();

      // まず全ユーザー集合を作る
      const users = new Set();
      for (const k of Q_KEYS) {
        const m = statsByLayer[k];
        for (const u of m.keys()) users.add(u);
      }

      // 合算
      for (const u of users) {
        let sum = 0;
        for (const k of Q_KEYS) {
          sum += (statsByLayer[k].get(u) || 0);
        }
        allMap.set(u, sum);
      }

      statsByLayer.all = allMap;
    }

    // カラーを必要数作る（10本でも見やすいように）
    function makeColors(n) {
      const base = ["#4e79a7", "#f28e2b", "#e15759", "#76b7b2", "#59a14f",
        "#edc949", "#af7aa1", "#ff9da7", "#9c755f", "#bab0ab"];
      const colors = [];
      for (let i = 0; i < n; i++) colors.push(base[i % base.length]);
      return colors;
    }

    // レイヤーごとに「前回の topN」を記録（切替時の誤スキップ防止）
    const lastSignatureByKey = { all: "", q1: "", q2: "", q3: "", q4: "", q5: "" };

    function renderTopNFromMap(map, keyForSignature) {
      if (!map || map.size === 0) {
        setChartNoData("受信データなし");
        lastSignatureByKey[keyForSignature] = "NODATA";
        return;
      }

      const top = [...map.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, TOP_N);

      if (top.length === 0) {
        setChartNoData("受信データなし");
        lastSignatureByKey[keyForSignature] = "NODATA";
        return;
      }

      const signature = top.map(([u, v]) => `${u}:${v}`).join("|");
      if (signature === lastSignatureByKey[keyForSignature]) return;
      lastSignatureByKey[keyForSignature] = signature;

      chart.data.labels = top.map(([user]) => user);
      chart.data.datasets[0].data = top.map(([, val]) => val);
      chart.data.datasets[0].backgroundColor = makeColors(top.length);
      chart.update("none");
    }

    // -----------------------------
    // 4) 初期化：切替時に LayerView の保持データ（またはクエリ）から max を作る
    //    - all の場合は q1〜q5 を初期化してから合算する
    // -----------------------------
    async function initStatsFromLayerView(key) {
      if (key === "all") {
        // q1〜q5 を初期化して合算
        for (const qk of Q_KEYS) {
          await initStatsFromLayerView(qk);
        }
        recomputeAllFromQs();
        return;
      }

      const lv = layerViewsObj[key];
      if (!lv) return;

      const map = statsByLayer[key];
      if (map.size > 0) return;

      if (lv.graphics) {
        ingestGraphicsMax(map, lv.graphics);
        return;
      }

      const fs = await lv.queryFeatures({
        where: "UserName IS NOT NULL AND TapCount IS NOT NULL",
        outFields: ["UserName", "TapCount"],
        returnGeometry: false,
        num: 2000
      });
      ingestGraphicsMax(map, fs?.features);
    }

    // -----------------------------
    // 5) レイヤー切替 UI
    // -----------------------------
    let activeKey = "all";

    async function activateLayer(key) {
      activeKey = key;

      await initStatsFromLayerView(key);

      // 表示
      if (activeKey === "all") {
        recomputeAllFromQs();
        chart.data.datasets[0].label = "q1〜q5 の TapCount MAX 合計 上位10 (UserName)";
        chart.options.plugins.title.text = "上位 10 ユーザー（q1〜q5 の TapCount MAX 合計 / 起動以降）";
        renderTopNFromMap(statsByLayer.all, "all");
      } else {
        chart.data.datasets[0].label = "TapCount MAX 上位10 (UserName)";
        chart.options.plugins.title.text = `上位 10 ユーザー（${activeKey.toUpperCase()} の TapCount MAX / 起動以降）`;
        renderTopNFromMap(statsByLayer[activeKey], activeKey);
      }

      // 切替直後に即1回（体感向上）
      pollActiveLayerOnce();
    }

    const layerSelect = document.getElementById("layerSelect");
    if (layerSelect) {
      layerSelect.addEventListener("calciteSelectChange", (e) => {
        activateLayer(e.target.value);
      });
    }

    // -----------------------------
    // 6) 定期ポーリング（setInterval）で更新
    //    - all の場合は q1〜q5 をクエリ→max更新→合算→描画
    //    - q1..q5 の場合は単体クエリ→max更新→描画
    // -----------------------------
    let pollTimer = null;
    let pollRunning = false;

    async function queryAndIngest(key) {
      const lv = layerViewsObj[key];
      if (!lv) return 0;

      const fs = await lv.queryFeatures({
        where: "UserName IS NOT NULL AND TapCount IS NOT NULL",
        outFields: ["UserName", "TapCount"],
        returnGeometry: false,
        orderByFields: ["TapCount DESC"],
        num: QUERY_NUM
      });

      const feats = fs?.features ?? [];
      if (feats.length) {
        ingestGraphicsMax(statsByLayer[key], feats);
      }
      return feats.length;
    }

    async function pollActiveLayerOnce() {
      if (pollRunning) return;
      pollRunning = true;

      try {
        let totalFetched = 0;

        if (activeKey === "all") {
          // ★q1〜q5 を並列クエリして更新
          const results = await Promise.all(Q_KEYS.map(k => queryAndIngest(k)));
          totalFetched = results.reduce((a, b) => a + b, 0);

          // 合算して描画
          recomputeAllFromQs();
          renderTopNFromMap(statsByLayer.all, "all");
        } else {
          totalFetched = await queryAndIngest(activeKey);
          renderTopNFromMap(statsByLayer[activeKey], activeKey);
        }

        if (chartStatus) {
          const keyLabel = (activeKey === "all") ? "タップ地点(all=合算)" : activeKey.toUpperCase();
          chartStatus.textContent = `更新: ${new Date().toLocaleTimeString()}  (${keyLabel}, 取得:${totalFetched})`;
        }
      } catch (e) {
        if (chartStatus) chartStatus.textContent = "更新エラー";
        // console.debug(e);
      } finally {
        pollRunning = false;
      }
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(pollActiveLayerOnce, POLL_MS);
      pollActiveLayerOnce();
    }

    function stopPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
    }

    // -----------------------------
    // 7) 初回起動
    // -----------------------------
    await activateLayer("all");
    startPolling();

    // -----------------------------
    // 8) チャートの表示切り替え
    // -----------------------------
    const toggleChartBtn = document.getElementById("toggleChartBtn");
    if (toggleChartBtn) {
      toggleChartBtn.addEventListener("click", () => {
        shellPanelBottom.toggleAttribute("collapsed");
        chart.resize();
      });
    }
  </script>


</body>

</html>
